server:
  port: 0

spring:
  application:
    name: product-service
  config:
    import: optional:configserver:${CONFIG_SERVER_URI:http://localhost:8888}
  profiles:
    active: ${SPRING_PROFILES_ACTIVE}
  kafka:
    consumer:
      group-id: product-service
      topic:
        user-topic: USER_TOPIC
        order-topic: ORDER_TOPIC

file:
  service:
    name: file-service
    url: ${FILE_SERVICE_URL:http://localhost:6969}

outbox:
  cron-job-rate-ms: ${OUTBOX_CRON_JOB_RATE_MS:5000}

cache:
  warm-up:
    enable: true
    batch-size: 50
  product:
    modified-time:
      ttl: 15 # seconds
async:
  core-pool-size: 10
  max-pool-size: 20
  queue-capacity: 100