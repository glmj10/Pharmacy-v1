server:
  port: 0

spring:
  application:
    name: payment-service
  config:
    import: optional:configserver:${CONFIG_SERVER_URI:http://localhost:8888}
  profiles:
    active: ${SPRING_PROFILES_ACTIVE}
gateway:
  url: ${APP_BASE_URL:http://localhost:8080}

management:
  endpoints:
    web:
      exposure:
        include: beans
frontend:
  vnp-return: ${FRONTEND_PAYMENT_RETURN_URL}
  cms-url: ${FRONTEND_CMS_URL}
  user-url: ${FRONTEND_USER_URL}
outbox:
  cron-job-rate-ms: ${OUTBOX_CRON_JOB_RATE_MS:5000}