server:
  port: 0

spring:
  application:
    name: cart-service
  config:
    import: optional:configserver:${CONFIG_SERVER_URI:http://localhost:8888}
  profiles:
    active: ${SPRING_PROFILES_ACTIVE}
  kafka:
    consumer:
      group-id: cart-service
      concurrency: 3
      topic:
        user-topic: USER_TOPIC
        product-topic: PRODUCT_TOPIC