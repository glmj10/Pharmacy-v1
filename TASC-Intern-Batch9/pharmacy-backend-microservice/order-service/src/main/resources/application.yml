server:
  port: 0

spring:
  application:
    name: order-service
  config:
    import: optional:configserver:${CONFIG_SERVER_URI:http://localhost:8888}
  profiles:
    active: ${SPRING_PROFILES_ACTIVE}
  kafka:
    consumer:
      group-id: order-service
      topic:
        payment-topic: PAYMENT_TOPIC
        user-topic: USER_TOPIC
        product-topic: PRODUCT_TOPIC
        profile-topic: PROFILE_TOPIC
  quartz:
    job-store-type: jdbc
    jdbc:
      initialize-schema: always
    properties:
      org:quartz:
        scheduler:
          instanceName: PromotionScheduler
          instanceId: AUTO
cart:
  service:
    name: cart-service
outbox:
  cron-job-rate-ms: ${OUTBOX_CRON_JOB_RATE_MS:5000}