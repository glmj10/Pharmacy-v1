server:
  port: 0

spring:
  application:
    name: identity-service
  config:
    import: optional:configserver:${CONFIG_SERVER_URI:http://localhost:8888}
  profiles:
    active: ${SPRING_PROFILES_ACTIVE}
  kafka:
    producer:
      topic:
        user-created: ${KAFKA_CREATE_USER_TOPIC:user-created}
        user-updated: ${KAFKA_UPDATE_USER_TOPIC:user-updated}
        user-verified: ${KAFKA_VERIFY_USER_TOPIC:user-verified}
outbox:
  cron-job-rate-ms: ${OUTBOX_CRON_JOB_RATE_MS:5000}