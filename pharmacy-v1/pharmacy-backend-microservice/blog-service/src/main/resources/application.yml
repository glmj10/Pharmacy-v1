server:
  port: 0

spring:
  application:
    name: blog-service
  config:
    import: optional:configserver:${CONFIG_SERVER_URI:http://localhost:8888}
  profiles:
    active: ${SPRING_PROFILES_ACTIVE}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  kafka:
    consumer:
      group-id: blog-service
      topic:
        category-topic: CATEGORY_TOPIC
file:
  service:
    name: file-service