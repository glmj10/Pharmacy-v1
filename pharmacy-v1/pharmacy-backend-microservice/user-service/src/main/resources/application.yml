server:
  port: 0

spring:
  application:
    name: user-service
  config:
    import: optional:configserver:${CONFIG_SERVER_URI:http://localhost:8888}
  profiles:
    active: ${SPRING_PROFILES_ACTIVE}
  kafka:
    consumer:
      group-id: user-service
      topic:
        user-topic: USER_TOPIC
outbox:
  cron-job-rate-ms: ${OUTBOX_CRON_JOB_RATE_MS:5000}