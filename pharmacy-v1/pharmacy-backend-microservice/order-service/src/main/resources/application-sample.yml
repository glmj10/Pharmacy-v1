spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE}
  datasource:
    url: ${DOCKER_DATASOURCE_URL}
    username: ${DATASOURCE_USERNAME}
    password: ${DATASOURCE_PASSWORD}
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${SPRING_MAIL_USERNAME}
    password: ${SPRING_MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:3600}
  reset-password:
    expiration: ${JWT_RESET_PASSWORD_EXPIRATION:600}
  refresh:
    expiration: ${JWT_REFRESH_EXPIRATION:86400}
  verify:
    expiration: ${JWT_VERIFICATION_EXPIRATION:600}
vnpay:
  tmn-code: ${VNPAY_TMN_CODE}
  hash-secret: ${VNPAY_HASH_SECRET}
  vnp-url: ${VNPAY_URL}
  return-url: ${VNPAY_RETURN_URL}
frontend:
  vnp-return: ${FRONTEND_PAYMENT_RETURN_URL}
  cms-url: ${FRONTEND_CMS_URL}
  user-url: ${FRONTEND_USER_URL}
